version: '3.9'

services:
  backend:
    environment:
      - APP_ENV=development
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/youtube_automation
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=change_me_in_production
      - CORS_ORIGINS=http://localhost:5173
      - LOG_LEVEL=DEBUG
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  worker:
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - backend
